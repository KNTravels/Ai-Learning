<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Learning Hub</title>
  <meta name="description" content="A JSON-driven learning hub for AI and software topics, tailored to your experience level." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  <header class="site-header">
    <div class="site-header__inner">
      <div class="brand">
        <span class="brand__icon" aria-hidden="true">📚</span>
        <span class="brand__name">AI Learning Hub</span>
      </div>
      <button
        id="theme-toggle"
        class="theme-toggle"
        type="button"
        aria-label="Toggle dark mode"
        aria-pressed="false"
      >
        <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
      </button>
    </div>
  </header>

  <main id="main-content" class="container">
    <section class="toolbar" aria-label="Filter topics">
      <div class="field">
        <label for="experience-select">Experience level</label>
        <select id="experience-select" aria-label="Select your experience level">
          <option value="0-5">0 - 5 Years</option>
          <option value="5-15">5 - 15 Years</option>
          <option value="15+">15+ Years</option>
        </select>
      </div>

      <div class="field field--search">
        <label for="search-input">Search topics</label>
        <div class="search-box">
          <span class="search-box__icon" aria-hidden="true">🔍</span>
          <input
            id="search-input"
            type="search"
            placeholder="Search by topic name or category..."
            autocomplete="off"
          />
        </div>
      </div>
    </section>

    <p id="results-meta" class="results-meta" role="status" aria-live="polite"></p>

    <section id="topics-grid" class="topics-grid" aria-label="Topics"></section>

    <p id="empty-state" class="empty-state" hidden>
      No topics match your search. Try a different keyword.
    </p>
  </main>

  <footer class="site-footer">
    <p>Content is fully driven by <code>data/topics.json</code>. Built with plain HTML, CSS and JavaScript.</p>
  </footer>

  <div id="modal-overlay" class="modal-overlay" hidden>
    <div
      id="topic-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
    >
      <button id="modal-close" class="modal__close" type="button" aria-label="Close dialog">&times;</button>

      <div class="modal__header">
        <span id="modal-icon" class="modal__icon" aria-hidden="true"></span>
        <div>
          <h2 id="modal-title" class="modal__title"></h2>
          <span id="modal-category" class="badge"></span>
        </div>
      </div>

      <div id="modal-images" class="modal__images"></div>

      <div id="modal-explanation" class="modal__explanation"></div>

      <div class="modal__takeaways">
        <h3>Key Takeaways</h3>
        <ul id="modal-takeaways"></ul>
      </div>
    </div>
  </div>

  <script src="js/app.js" defer></script>
</body>
</html>
